modality: "vision"
dt: 0.05
num_steps_simulation: 130
num_steps_horizon: 11
x_init:
  0: {value: 0, rand: false, min: -0.25, max: 0.25}
  1: {value: 0, rand: false, min: -0.25, max: 0.25}
  2: {value: 0, rand: false}
  3: {value: 0, rand: false}
  4: {value: 0, rand: false}
  5: {value: 0, rand: false}
num_simulations: 2
plot: true
save_images: false
old: false
use_nominal_plant: false
control_type: "mpc"

constraints:
  use_inputs_constraints: false
  force_limits: [7.5, 12.]
  torque_limits: [-1.3, 1.3]

x_ref:
  specs:
     0: { type: sine, amplitude: 0.2, freq_hz: 0.15, phase: 0 }
     1: { type: sine_cosine, amplitude: 0.1, freq_hz: 0.15, phase: 0 }

cost:
  R: [0.01, 0.01]
  S: [0.025, 0.025]
  Q_positions: 3
  Q_velocities: 1
  P_positions: 4
  P_velocities: 1

solver_options:
  nlp_solver_type: "SQP"
  nlp_solver_iter_max: 20
  nlp_tol: 1.0e-4
  qp_solver_iter_max: 100
  qp_tol: 1.0e-8
  accept_suboptimal: false
  regularization: 1.0e-8
  print_level: 0