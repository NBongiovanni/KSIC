modality: "vision"
dt: 0.05
num_steps_simulation: 50
num_steps_horizon: 11
x_init:
  0: {value: 0, rand: false, min: -0.25, max: 0.25}
  1: {value: 0, rand: false, min: -0.25, max: 0.25}
  2: {value: 0, rand: false}
  3: {value: 0, rand: false}
  4: {value: 0, rand: false}
  5: {value: 0, rand: false}
num_simulations: 2
plot: true
save_images: false
old: false
use_nominal_plant: false
control_type: "mpc"

constraints:
  use_inputs_constraints: false
  force_limits: [7.5, 12.]
  torque_limits: [-2.5, 2.5]

x_ref:
  specs:
     0: { type: constant, value: 0.1, rand: false, min: -0.2, max: 0.25 }
     1: { type: constant, value: 0.1, rand: false, min: -0.2, max: 0.25 }

cost:
  R: [0.0001, 0.0001]
  S: [0.005, 0.005]
  Q_positions: 3
  Q_velocities: 0.5
  P_positions: 6
  P_velocities: 3

solver_options:
  nlp_solver_type: "SQP"
  nlp_solver_iter_max: 12
  nlp_tol: 1.0e-6
  qp_solver_iter_max: 100
  qp_tol: 1.0e-8
  accept_suboptimal: false
  regularization: 1.0e-6
  print_level: 0