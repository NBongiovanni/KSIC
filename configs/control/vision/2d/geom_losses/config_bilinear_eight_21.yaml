modality: "vision"
dt: 0.05
num_steps_simulation: 130
num_steps_horizon: 10
x_init:
  0: {value: 0., rand: false, min: -0.25, max: 0.25}
  1: {value: 0., rand: false, min: -0.25, max: 0.25}
  2: {value: 0, rand: false}
  3: {value: 0, rand: false}
  4: {value: 0, rand: false}
  5: {value: 0, rand: false}
num_simulations: 1
plot: true
render_images: true
old: false
use_nominal_plant: false
control_type: "mpc"

constraints:
  use_inputs_constraints: false
  force_limits: [7., 12.]
  torque_limits: [-2., 2.]

x_ref:
  specs:
     0: { type: sine, amplitude: 0.2, freq_hz: 0.167, phase: 0 }
     1: { type: sine_cosine, amplitude: 0.2, freq_hz: 0.167, phase: 0 }

cost:
  R: [0.005, 0.005]
  S: [0.04, 0.04]
  Q_positions: 8
  Q_velocities: 3
  P_positions: 12
  P_velocities: 4

solver_options:
  nlp_solver_type: "SQP"
  nlp_solver_iter_max: 10
  nlp_tol: 1.0e-4
  qp_solver_iter_max: 100
  qp_tol: 1.0e-8
  accept_suboptimal: true
  regularization: 1.0e-8
  print_level: 0