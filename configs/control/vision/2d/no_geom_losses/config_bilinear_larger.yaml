modality: "vision"
dt: 0.05
num_steps_simulation: 75
num_steps_horizon: 15
x_init:
  0: {value: 0, rand: true, min: -0.4, max: 0.4}
  1: {value: 0, rand: true, min: -0.4, max: 0.4}
  2: {value: 0, rand: false}
  3: {value: 0, rand: false}
  4: {value: 0, rand: false}
  5: {value: 0, rand: false}
num_simulations: 25
render: false
plot: true

constraints:
  use_inputs_constraints: false
  force_limits: [7.0, 12.5]
  torque_limits: [-2., 2.]

x_ref:
  specs:
     # 0: { type: sine, amplitude: 0.25, freq_hz: 0.3, phase: 0 }
     # 1: { type: cosine, amplitude: 0.25, freq_hz: 0.15, phase: 0 }
     0: { type: constant, value: -0.3, rand: true, min: -0.4, max: 0.4}
     1: { type: constant, value: -0.3, rand: true, min: -0.4, max: 0.4}

cost:
  R: [0.001, 0.01]
  S: [0.05, 0.05]
  Qz: 10
  only_position: false
  Pz: 10

solver_options:
  nlp_solver_type: "SQP"
  nlp_solver_iter_max: 5
  nlp_tol: 1.0e-4
  qp_solver_iter_max: 100
  qp_tol: 1.0e-8
  accept_suboptimal: true
  regularization: 1.0e-8
  print_level: 0
